<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConfigResolver & ModifierEngine Tests</title>
    <style>
        body {
            font-family: 'Courier New', monospace;
            background: #1a1a1a;
            color: #00ff00;
            padding: 20px;
            margin: 0;
        }
        .test-header {
            color: #00ccff;
            font-size: 1.5em;
            margin-bottom: 20px;
            border-bottom: 2px solid #00ccff;
            padding-bottom: 10px;
        }
        .test-section {
            margin: 20px 0;
            padding: 15px;
            border: 1px solid #333;
            background: #0a0a0a;
        }
        .run-button {
            background: #004400;
            color: #00ff00;
            border: 2px solid #00ff00;
            padding: 10px 20px;
            font-family: inherit;
            font-size: 1em;
            cursor: pointer;
            margin: 10px 5px;
        }
        .run-button:hover {
            background: #006600;
        }
        .run-button:active {
            background: #008800;
        }
        .output {
            background: #000;
            border: 1px solid #333;
            padding: 10px;
            margin: 10px 0;
            min-height: 200px;
            overflow-y: auto;
            white-space: pre-wrap;
            font-family: 'Courier New', monospace;
        }
        .success { color: #00ff00; }
        .error { color: #ff0000; }
        .warning { color: #ffaa00; }
        .info { color: #00ccff; }
    </style>
</head>
<body>
    <h1 class="test-header">🧪 ConfigResolver & ModifierEngine Test Suite</h1>
    
    <div class="test-section">
        <h2>Test Controls</h2>
        <button class="run-button" onclick="runConfigResolverTests()">
            🔧 Test ConfigResolver
        </button>
        <button class="run-button" onclick="runModifierEngineTests()">
            ⚙️ Test ModifierEngine
        </button>
        <button class="run-button" onclick="runAllTests()">
            🚀 Run All Tests
        </button>
        <button class="run-button" onclick="clearOutput()">
            🗑️ Clear Output
        </button>
    </div>

    <div class="test-section">
        <h2>Test Output</h2>
        <div id="output" class="output">
            Ready to run tests... Click a button above to start.
        </div>
    </div>

    <div class="test-section">
        <h2>Integration Test</h2>
        <button class="run-button" onclick="runIntegrationTest()">
            🔗 Test ConfigResolver + ModifierEngine Integration
        </button>
        <p>Tests the complete pipeline: GameConfig → ConfigResolver → ModifierEngine → Final Stats</p>
    </div>

    <script type="module">
        import { ConfigResolver } from '../core/utils/ConfigResolver.js';
        import { ModifierEngine } from '../core/utils/ModifierEngine.js';
        import { GameConfig } from '../config.js';

        // Make available globally for onclick handlers
        window.ConfigResolver = ConfigResolver;
        window.ModifierEngine = ModifierEngine;
        window.GameConfig = GameConfig;

        // Output utilities
        window.log = (message, type = 'info') => {
            const output = document.getElementById('output');
            const timestamp = new Date().toLocaleTimeString();
            const className = type === 'success' ? 'success' : 
                             type === 'error' ? 'error' : 
                             type === 'warning' ? 'warning' : 'info';
            output.innerHTML += `<span class="${className}">[${timestamp}] ${message}</span>\n`;
            output.scrollTop = output.scrollHeight;
        };

        window.clearOutput = () => {
            document.getElementById('output').innerHTML = 'Output cleared.\n';
        };

        // ConfigResolver Tests
        window.runConfigResolverTests = () => {
            log('🧪 Starting ConfigResolver tests...', 'info');
            
            try {
                // Test 1: Basic fallback resolution
                const damage = ConfigResolver.get('player.projectile.baseDamage', {
                    warnIfMissing: false
                });
                if (damage === 10) {
                    log('✅ Test 1: Basic fallback resolution - PASSED', 'success');
                } else {
                    log(`❌ Test 1: Expected 10, got ${damage}`, 'error');
                }

                // Test 2: GameConfig resolution
                const playerSpeed = ConfigResolver.get('player.baseSpeed', {
                    source: 'config',
                    warnIfMissing: false
                });
                if (playerSpeed === GameConfig.player.baseSpeed) {
                    log('✅ Test 2: GameConfig resolution - PASSED', 'success');
                } else {
                    log(`❌ Test 2: Expected ${GameConfig.player.baseSpeed}, got ${playerSpeed}`, 'error');
                }

                // Test 3: Blueprint preference
                const blueprintValue = ConfigResolver.get('test.value', {
                    blueprint: { test: { value: 42 } },
                    source: 'auto',
                    warnIfMissing: false
                });
                if (blueprintValue === 42) {
                    log('✅ Test 3: Blueprint preference - PASSED', 'success');
                } else {
                    log(`❌ Test 3: Expected 42, got ${blueprintValue}`, 'error');
                }

                // Test 4: Multiple value resolution
                const multiValues = ConfigResolver.getMany([
                    'player.projectile.baseDamage',
                    'limits.maxEmitters'
                ], { warnIfMissing: false });
                
                if (multiValues['player.projectile.baseDamage'] === 10 && 
                    multiValues['limits.maxEmitters'] === 24) {
                    log('✅ Test 4: Multiple value resolution - PASSED', 'success');
                } else {
                    log(`❌ Test 4: Unexpected multi-values: ${JSON.stringify(multiValues)}`, 'error');
                }

                // Test 5: Telemetry
                ConfigResolver.resetTelemetry();
                ConfigResolver.get('nonexistent.path', { warnIfMissing: true });
                const report = ConfigResolver.getTelemetryReport();
                if (report.totalMissingPaths === 1) {
                    log('✅ Test 5: Telemetry tracking - PASSED', 'success');
                } else {
                    log(`❌ Test 5: Expected 1 missing path, got ${report.totalMissingPaths}`, 'error');
                }

                log('🎉 ConfigResolver tests completed!', 'success');
                
            } catch (error) {
                log(`❌ ConfigResolver tests failed: ${error.message}`, 'error');
                console.error(error);
            }
        };

        // ModifierEngine Tests
        window.runModifierEngineTests = () => {
            log('⚙️ Starting ModifierEngine tests...', 'info');
            
            try {
                const baseStats = { damage: 10, speed: 4, hp: 100 };

                // Test 1: ADD modifier
                let modifiers = [{ path: 'damage', type: 'add', value: 5, source: 'test' }];
                let result = ModifierEngine.apply(baseStats, modifiers);
                if (result.damage === 15) {
                    log('✅ Test 1: ADD modifier - PASSED', 'success');
                } else {
                    log(`❌ Test 1: Expected 15, got ${result.damage}`, 'error');
                }

                // Test 2: MUL modifier
                modifiers = [{ path: 'speed', type: 'mul', value: 0.5, source: 'test' }];
                result = ModifierEngine.apply(baseStats, modifiers);
                if (result.speed === 6) { // 4 * (1 + 0.5)
                    log('✅ Test 2: MUL modifier - PASSED', 'success');
                } else {
                    log(`❌ Test 2: Expected 6, got ${result.speed}`, 'error');
                }

                // Test 3: Priority system (SET > ADD > MUL)
                modifiers = [
                    { path: 'damage', type: 'mul', value: 1.0, source: 'mul' },  // *2, should be last
                    { path: 'damage', type: 'set', value: 20, source: 'set' },   // should be first
                    { path: 'damage', type: 'add', value: 5, source: 'add' }     // should be middle
                ];
                result = ModifierEngine.apply(baseStats, modifiers);
                // SET(20) -> ADD(+5=25) -> MUL(*2=50)
                if (result.damage === 50) {
                    log('✅ Test 3: Priority system - PASSED', 'success');
                } else {
                    log(`❌ Test 3: Expected 50, got ${result.damage}`, 'error');
                }

                // Test 4: Level-based application
                const blueprintMods = [
                    { path: 'damage', type: 'add', perLevel: 5, source: 'powerup' }
                ];
                const levels = { powerup: 3 };
                result = ModifierEngine.applyWithLevels(baseStats, blueprintMods, levels);
                if (result.damage === 25) { // 10 + (5 * 3)
                    log('✅ Test 4: Level-based application - PASSED', 'success');
                } else {
                    log(`❌ Test 4: Expected 25, got ${result.damage}`, 'error');
                }

                // Test 5: Nested paths
                const nestedStats = { projectile: { damage: 15 } };
                modifiers = [{ path: 'projectile.damage', type: 'add', value: 10, source: 'test' }];
                result = ModifierEngine.apply(nestedStats, modifiers);
                if (result.projectile.damage === 25) {
                    log('✅ Test 5: Nested paths - PASSED', 'success');
                } else {
                    log(`❌ Test 5: Expected 25, got ${result.projectile.damage}`, 'error');
                }

                // Test 6: Caps and limits
                modifiers = [
                    { path: 'damage', type: 'add', value: 100, cap: 50, source: 'test' }
                ];
                result = ModifierEngine.apply(baseStats, modifiers);
                if (result.damage === 50) { // Capped at 50
                    log('✅ Test 6: Caps and limits - PASSED', 'success');
                } else {
                    log(`❌ Test 6: Expected 50 (capped), got ${result.damage}`, 'error');
                }

                log('🎉 ModifierEngine tests completed!', 'success');
                
            } catch (error) {
                log(`❌ ModifierEngine tests failed: ${error.message}`, 'error');
                console.error(error);
            }
        };

        // Integration test
        window.runIntegrationTest = () => {
            log('🔗 Starting integration test...', 'info');
            
            try {
                // Simulate power-up application pipeline
                
                // 1. Get base values from ConfigResolver
                const baseDamage = ConfigResolver.get('player.projectile.baseDamage');
                const baseSpeed = ConfigResolver.get('player.baseSpeed', { source: 'config' });
                
                log(`📋 Base stats from ConfigResolver: damage=${baseDamage}, speed=${baseSpeed}`, 'info');
                
                // 2. Create base stats object
                const baseStats = {
                    damage: baseDamage,
                    speed: baseSpeed,
                    hp: ConfigResolver.get('player.baseHP', { source: 'config' })
                };
                
                // 3. Simulate active power-ups with modifiers
                const activeModifiers = [
                    {
                        path: 'damage',
                        type: 'add',
                        perLevel: 5, // Damage boost +5 per level
                        source: 'powerup.damage_boost'
                    },
                    {
                        path: 'speed',
                        type: 'mul',
                        perLevel: 0.15, // Speed boost +15% per level
                        source: 'powerup.speed_boots'
                    },
                    {
                        path: 'hp',
                        type: 'add',
                        perLevel: 20, // HP boost +20 per level
                        source: 'powerup.max_hp'
                    }
                ];
                
                const powerUpLevels = {
                    'powerup.damage_boost': 3,
                    'powerup.speed_boots': 2,
                    'powerup.max_hp': 1
                };
                
                // 4. Apply modifiers through ModifierEngine
                const finalStats = ModifierEngine.applyWithLevels(baseStats, activeModifiers, powerUpLevels);
                
                log(`🎯 Final stats after ModifierEngine:`, 'info');
                log(`   Damage: ${baseStats.damage} → ${finalStats.damage} (+${finalStats.damage - baseStats.damage})`, 'info');
                log(`   Speed: ${baseStats.speed} → ${finalStats.speed.toFixed(2)} (+${((finalStats.speed / baseStats.speed - 1) * 100).toFixed(1)}%)`, 'info');
                log(`   HP: ${baseStats.hp} → ${finalStats.hp} (+${finalStats.hp - baseStats.hp})`, 'info');
                
                // 5. Validate expected results
                const expectedDamage = baseDamage + (5 * 3); // +15 damage
                const expectedSpeed = baseSpeed * (1 + 0.15 * 2); // +30% speed
                const expectedHp = baseStats.hp + (20 * 1); // +20 HP
                
                if (Math.abs(finalStats.damage - expectedDamage) < 0.01 &&
                    Math.abs(finalStats.speed - expectedSpeed) < 0.01 &&
                    Math.abs(finalStats.hp - expectedHp) < 0.01) {
                    log('✅ Integration test - PASSED', 'success');
                    log('🎉 Complete pipeline working correctly!', 'success');
                } else {
                    log(`❌ Integration test - FAILED`, 'error');
                    log(`Expected: damage=${expectedDamage}, speed=${expectedSpeed}, hp=${expectedHp}`, 'error');
                    log(`Got: damage=${finalStats.damage}, speed=${finalStats.speed}, hp=${finalStats.hp}`, 'error');
                }
                
            } catch (error) {
                log(`❌ Integration test failed: ${error.message}`, 'error');
                console.error(error);
            }
        };

        // Run all tests
        window.runAllTests = () => {
            log('🚀 Running complete test suite...', 'info');
            clearOutput();
            
            setTimeout(() => {
                runConfigResolverTests();
                setTimeout(() => {
                    runModifierEngineTests();
                    setTimeout(() => {
                        runIntegrationTest();
                        log('🏁 All tests completed!', 'success');
                    }, 100);
                }, 100);
            }, 100);
        };

        // Auto-run basic test on load
        setTimeout(() => {
            log('🎮 ConfigResolver & ModifierEngine Test Suite Ready', 'success');
            log('Click buttons above to run tests, or check browser console for detailed output.', 'info');
            
            // Quick validation that modules loaded correctly
            if (typeof ConfigResolver !== 'undefined' && typeof ModifierEngine !== 'undefined') {
                log('✅ All modules loaded successfully', 'success');
            } else {
                log('❌ Module loading failed', 'error');
            }
        }, 100);

    </script>
</body>
</html>
