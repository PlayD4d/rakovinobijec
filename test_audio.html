<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Test</title>
</head>
<body>
    <h1>Audio Loading Test</h1>
    <button id="startBtn">Start Game</button>
    <div id="log" style="font-family: monospace; white-space: pre; margin-top: 20px; border: 1px solid #ccc; padding: 10px; height: 400px; overflow-y: auto;"></div>
    
    <script>
        const log = document.getElementById('log');
        const originalLog = console.log;
        const originalWarn = console.warn;
        const originalError = console.error;
        
        // Override console to capture logs
        console.log = function(...args) {
            originalLog.apply(console, args);
            log.textContent += '[LOG] ' + args.join(' ') + '\n';
            log.scrollTop = log.scrollHeight;
        };
        
        console.warn = function(...args) {
            originalWarn.apply(console, args);
            log.textContent += '[WARN] ' + args.join(' ') + '\n';
            log.scrollTop = log.scrollHeight;
        };
        
        console.error = function(...args) {
            originalError.apply(console, args);
            log.textContent += '[ERROR] ' + args.join(' ') + '\n';
            log.scrollTop = log.scrollHeight;
        };
        
        document.getElementById('startBtn').onclick = function() {
            log.textContent = 'Starting test...\n';
            
            // Create an iframe to load the game
            const iframe = document.createElement('iframe');
            iframe.src = '/index.html';
            iframe.style.width = '100%';
            iframe.style.height = '600px';
            iframe.style.border = '2px solid #333';
            document.body.appendChild(iframe);
            
            // Listen for messages from the iframe
            window.addEventListener('message', (event) => {
                if (event.data && event.data.type === 'console') {
                    log.textContent += `[IFRAME ${event.data.level}] ${event.data.message}\n`;
                    log.scrollTop = log.scrollHeight;
                }
            });
        };
    </script>
</body>
</html>
