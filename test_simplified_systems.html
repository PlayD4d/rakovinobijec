<!DOCTYPE html>
<html>
<head>
    <title>Simplified VFX/SFX Systems Test</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: monospace;
            background: #222;
            color: #fff;
        }
        #game-container {
            border: 2px solid #444;
            display: inline-block;
        }
        #controls {
            margin-top: 20px;
        }
        button {
            margin: 5px;
            padding: 10px;
            background: #444;
            color: #fff;
            border: 1px solid #666;
            cursor: pointer;
        }
        button:hover {
            background: #555;
        }
        #info {
            margin-top: 20px;
            padding: 10px;
            background: #333;
            border: 1px solid #555;
        }
    </style>
</head>
<body>
    <h1>Simplified VFX/SFX Systems Test</h1>
    <div id="game-container"></div>
    
    <div id="controls">
        <h3>VFX Tests:</h3>
        <button onclick="testVFX('hit.small')">Small Hit</button>
        <button onclick="testVFX('hit.medium')">Medium Hit</button>
        <button onclick="testVFX('explosion.small')">Small Explosion</button>
        <button onclick="testVFX('explosion.large')">Large Explosion</button>
        <button onclick="testVFX('spawn')">Spawn Effect</button>
        <button onclick="testVFX('death.medium')">Death Burst</button>
        <button onclick="testVFX('pickup')">Pickup Effect</button>
        <button onclick="testVFX('shield.hit')">Shield Hit</button>
        
        <h3>SFX Tests:</h3>
        <button onclick="testSFX('sound/hit_soft_norm.mp3')">Hit Sound</button>
        <button onclick="testSFX('sound/explosion_small_norm.mp3')">Explosion Sound</button>
        <button onclick="testSFX('sound/pickup_norm.mp3')">Pickup Sound</button>
        <button onclick="testSFX('sound/levelup_norm.mp3')">Level Up Sound</button>
        
        <h3>Custom VFX:</h3>
        <button onclick="testCustomVFX()">Custom Particles</button>
        <button onclick="testInlineVFX()">Inline Config</button>
        
        <h3>Legacy ID Test:</h3>
        <button onclick="testLegacy()">Test Legacy IDs</button>
    </div>
    
    <div id="info">
        <p>Click buttons to test VFX and SFX systems</p>
        <p>All effects use simplified systems without registries</p>
        <p id="status">Ready</p>
    </div>
    
    <script type="module">
        import { VFXSystem } from './js/core/vfx/VFXSystem.js';
        import { SimplifiedAudioSystem } from './js/core/audio/SimplifiedAudioSystem.js';
        import { VFXPresets } from './js/core/vfx/VFXPresets.js';
        
        class TestScene extends Phaser.Scene {
            constructor() {
                super({ key: 'TestScene' });
            }
            
            preload() {
                // Create simple particle texture
                this.load.image('particle', 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAgAAAAICAYAAADED76LAAAAH0lEQVQYV2P8////fwYGBgYmBgYGBkYGBgZGKI0MAAA6DAQBvB8mQwAAAABJRU5ErkJggg==');
                
                // Load some audio files (these need to exist)
                // For testing, we'll skip actual audio loading
            }
            
            create() {
                // Initialize systems
                this.vfxSystem = new VFXSystem(this);
                this.vfxSystem.initialize();
                
                this.audioSystem = new SimplifiedAudioSystem(this);
                this.audioSystem.initialize();
                
                // Add background
                this.add.rectangle(400, 300, 800, 600, 0x111111);
                
                // Add reference point
                this.add.circle(400, 300, 5, 0xff0000);
                
                // Make systems globally accessible for testing
                window.testScene = this;
                window.vfxSystem = this.vfxSystem;
                window.audioSystem = this.audioSystem;
                window.VFXPresets = VFXPresets;
                
                updateStatus('Systems initialized');
            }
            
            update(time, delta) {
                if (this.vfxSystem) {
                    this.vfxSystem.update(time, delta);
                }
            }
        }
        
        const config = {
            type: Phaser.AUTO,
            width: 800,
            height: 600,
            parent: 'game-container',
            scene: TestScene,
            physics: {
                default: 'arcade'
            }
        };
        
        const game = new Phaser.Game(config);
        
        // Test functions
        window.testVFX = function(preset) {
            if (!window.vfxSystem) {
                updateStatus('VFX System not ready');
                return;
            }
            
            const x = 400 + (Math.random() - 0.5) * 200;
            const y = 300 + (Math.random() - 0.5) * 200;
            
            window.vfxSystem.play(preset, x, y);
            updateStatus(`Playing VFX: ${preset} at (${Math.round(x)}, ${Math.round(y)})`);
        };
        
        window.testSFX = function(soundPath) {
            if (!window.audioSystem) {
                updateStatus('Audio System not ready');
                return;
            }
            
            // Note: This will fail without actual sound files
            window.audioSystem.play(soundPath);
            updateStatus(`Playing SFX: ${soundPath}`);
        };
        
        window.testCustomVFX = function() {
            if (!window.vfxSystem) return;
            
            const customConfig = {
                particles: {
                    quantity: 20,
                    speed: { min: 100, max: 300 },
                    scale: { start: 0.5, end: 0 },
                    lifespan: 600,
                    tint: 0xFF00FF,
                    angle: { min: 0, max: 360 }
                }
            };
            
            window.vfxSystem.play(customConfig, 400, 300);
            updateStatus('Playing custom particle effect');
        };
        
        window.testInlineVFX = function() {
            if (!window.vfxSystem) return;
            
            // Simulate blueprint inline config
            const blueprintVFX = {
                particles: {
                    quantity: 15,
                    speed: { min: 50, max: 150 },
                    scale: { start: 0.3, end: 0 },
                    lifespan: 400,
                    tint: 0x00FF00,
                    gravityY: 50
                }
            };
            
            window.vfxSystem.play(blueprintVFX, 400, 300);
            updateStatus('Playing inline VFX config (as from blueprint)');
        };
        
        window.testLegacy = function() {
            if (!window.vfxSystem) return;
            
            // Test legacy ID fallback
            window.vfxSystem.play('vfx.hit.spark', 300, 300);
            window.vfxSystem.play('vfx.explosion.large', 500, 300);
            window.vfxSystem.play('vfx.death.burst', 400, 400);
            
            updateStatus('Testing legacy ID fallback (should map to presets)');
        };
        
        function updateStatus(message) {
            document.getElementById('status').textContent = `Status: ${message}`;
            console.log(message);
        }
    </script>
</body>
</html>
