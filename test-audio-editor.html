<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Audio System Test</title>
    <style>
        body {
            font-family: 'Monaco', 'Courier New', monospace;
            background: #1e1e1e;
            color: #ccc;
            padding: 20px;
            line-height: 1.6;
        }
        .test-section {
            background: #252525;
            border: 1px solid #3e3e3e;
            border-radius: 6px;
            padding: 15px;
            margin: 10px 0;
        }
        .test-title {
            color: #4CAF50;
            font-size: 18px;
            margin-bottom: 10px;
        }
        .test-result {
            padding: 10px;
            margin: 5px 0;
            border-radius: 4px;
        }
        .success {
            background: rgba(76, 175, 80, 0.2);
            border: 1px solid #4CAF50;
        }
        .error {
            background: rgba(244, 67, 54, 0.2);
            border: 1px solid #f44336;
        }
        .info {
            background: rgba(33, 150, 243, 0.2);
            border: 1px solid #2196F3;
        }
        button {
            background: #2196F3;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            margin: 5px;
        }
        button:hover {
            background: #1976D2;
        }
        pre {
            background: #1a1a1a;
            padding: 10px;
            border-radius: 4px;
            overflow-x: auto;
        }
    </style>
</head>
<body>
    <h1>🎵 PR7 Audio System Test</h1>
    
    <div class="test-section">
        <div class="test-title">1. AudioScanner Test</div>
        <button onclick="testAudioScanner()">Test AudioScanner</button>
        <div id="scanner-result"></div>
    </div>
    
    <div class="test-section">
        <div class="test-title">2. Direct Path Test</div>
        <button onclick="testDirectPath()">Test Direct Path</button>
        <div id="path-result"></div>
    </div>
    
    <div class="test-section">
        <div class="test-title">3. Blueprint Test</div>
        <button onclick="testBlueprint()">Test Blueprint with Audio</button>
        <div id="blueprint-result"></div>
    </div>
    
    <div class="test-section">
        <div class="test-title">4. Editor Test</div>
        <button onclick="openEditor()">Open Editor</button>
        <button onclick="openTestAudioBrowser()">Test Audio Browser</button>
        <div id="editor-result"></div>
    </div>

    <script type="module">
        // Test AudioScanner
        window.testAudioScanner = async function() {
            const resultDiv = document.getElementById('scanner-result');
            resultDiv.innerHTML = '<div class="info">Loading AudioScanner...</div>';
            
            try {
                const { audioScanner } = await import('./editor/js/modules/AudioScanner.js');
                const files = await audioScanner.getAudioFiles();
                
                resultDiv.innerHTML = `
                    <div class="success">
                        ✅ AudioScanner loaded successfully<br>
                        📁 Total files: ${files.all.length}<br>
                        🎵 Music: ${files.music.length}<br>
                        🔊 SFX: ${files.sfx.length}<br>
                        <br>
                        <strong>Sample paths:</strong><br>
                        <pre>${files.all.slice(0, 3).map(f => f.path).join('\n')}</pre>
                    </div>
                `;
            } catch (error) {
                resultDiv.innerHTML = `<div class="error">❌ Error: ${error.message}</div>`;
            }
        };
        
        // Test Direct Path
        window.testDirectPath = function() {
            const resultDiv = document.getElementById('path-result');
            
            const testPaths = [
                'sound/laser.mp3',
                'sound/player_hit.mp3',
                'music/level_1.mp3',
                'sfx.enemy.spawn'  // Legacy format
            ];
            
            const results = testPaths.map(path => {
                const isDirectPath = !path.startsWith('sfx.');
                return `${path} → ${isDirectPath ? '✅ Direct Path' : '⚠️ Legacy Registry'}`;
            });
            
            resultDiv.innerHTML = `
                <div class="success">
                    <strong>Path Detection Results:</strong><br>
                    <pre>${results.join('\n')}</pre>
                    <br>
                    <strong>PR7 Format (direct paths):</strong><br>
                    <pre>{
  "sfx": {
    "spawn": "sound/npc_spawn.mp3",
    "hit": "sound/npc_hit.mp3",
    "death": "sound/npc_death.mp3"
  }
}</pre>
                </div>
            `;
        };
        
        // Test Blueprint
        window.testBlueprint = function() {
            const resultDiv = document.getElementById('blueprint-result');
            
            const exampleBlueprint = {
                id: "enemy.test_enemy",
                type: "enemy",
                sfx: {
                    spawn: "sound/npc_spawn.mp3",
                    hit: "sound/npc_hit.mp3",
                    death: "sound/npc_death.mp3"
                },
                music: {
                    boss: "music/boss.mp3"
                }
            };
            
            resultDiv.innerHTML = `
                <div class="success">
                    <strong>Example Blueprint with PR7 Audio:</strong><br>
                    <pre>${JSON.stringify(exampleBlueprint, null, 2)}</pre>
                    <br>
                    ✅ All audio uses direct file paths<br>
                    ✅ No manifest references<br>
                    ✅ PR7 compliant
                </div>
            `;
        };
        
        // Open Editor
        window.openEditor = function() {
            window.open('/editor/index.html', '_blank');
        };
        
        // Test Audio Browser
        window.openTestAudioBrowser = function() {
            window.open('/editor/test-audio-browser.html', '_blank');
        };
    </script>
</body>
</html>
