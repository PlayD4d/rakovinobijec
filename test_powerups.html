<!DOCTYPE html>
<html>
<head>
    <title>PowerUp Test - No ModifierEngine</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.min.js"></script>
</head>
<body>
    <div id="game-container"></div>
    <script type="module">
        // Simple test to verify power-ups work without ModifierEngine
        import { GameScene } from './js/scenes/GameScene.js';
        
        const config = {
            type: Phaser.AUTO,
            width: 800,
            height: 600,
            parent: 'game-container',
            physics: {
                default: 'arcade',
                arcade: { debug: false }
            },
            scene: [GameScene]
        };
        
        const game = new Phaser.Game(config);
        
        // Test after game loads
        setTimeout(() => {
            const scene = game.scene.getScene('GameScene');
            if (scene && scene.player) {
                console.log('Testing modifier application...');
                
                // Test direct modifier application
                const beforeDamage = scene.player.getDamage();
                scene.player.activeModifiers = [
                    { path: 'damage', type: 'add', value: 10 },
                    { path: 'damage', type: 'multiply', value: 1.5 }
                ];
                const afterDamage = scene.player.getDamage();
                
                console.log('Damage before modifiers:', beforeDamage);
                console.log('Damage after modifiers:', afterDamage);
                console.log('Expected:', (beforeDamage + 10) * 1.5);
                
                if (Math.abs(afterDamage - (beforeDamage + 10) * 1.5) < 0.01) {
                    console.log('✅ Modifier system working correctly!');
                } else {
                    console.error('❌ Modifier calculation incorrect!');
                }
                
                // Test shield
                scene.player.shieldActive = true;
                scene.player.shieldHits = 3;
                console.log('Shield active:', scene.player.shieldActive);
                console.log('Shield hits:', scene.player.shieldHits);
                
                // Test XP magnet
                scene.player.xpMagnetLevel = 2;
                const magnetRadius = scene.player.getXPMagnetRadius();
                console.log('XP Magnet radius at level 2:', magnetRadius);
                console.log('Expected:', 100 * Math.pow(1.25, 2), '=', 100 * 1.5625);
                
                console.log('✅ All power-up properties accessible without ModifierEngine!');
            }
        }, 2000);
    </script>
</body>
</html>
